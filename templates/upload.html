<!DOCTYPE html>
<html lang="en">
<head>
    <title>Upload X-Ray</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="card card-dark p-5 w-75 mx-auto">
            <h3>🩺 Select Chest X-Ray Images</h3>
            <p class="text-muted">Upload one NORMAL and one PNEUMONIA scan for comparison</p>
            
            <form action="/predict" method="POST" enctype="multipart/form-data">
                <div class="mb-4">
                    <label>Image 1 (Normal)</label>
                    <input type="file" name="image1" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <div class="mb-4">
                    <label>Image 2 (Pneumonia)</label>
                    <input type="file" name="image2" class="form-control bg-dark text-white border-secondary" required>
                </div>
                <button type="submit" class="btn btn-primary rounded-pill px-4">🔮 Analyze Images</button>
            </form>
        </div>
    </div>
</body>
</html>
