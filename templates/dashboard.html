<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="p-4">
    <div class="dashboard-grid">
        <div class="card-panel">
            <h5>Diagnosis</h5>
            <div class="badge-normal mb-3">NORMAL</div>
            <p>Confidence: {{ data.img1.confidence }}%</p>
            <div class="progress mb-4" style="height: 8px;"><div class="progress-bar bg-info" style="width: 99.6%"></div></div>
            <a href="/upload" class="btn btn-outline-light w-100">New Scan</a>
        </div>

        <div class="dashboard-content">
            <h4 class="mb-3">🧠 AI Analysis Dashboard</h4>
            <div class="row">
                <div class="col-6"><div class="card-panel"><h6>Original</h6><img src="{{ url_for('static', filename=data.img1.pipeline.original) }}" class="fixed-img"></div></div>
                <div class="col-6"><div class="card-panel"><h6>Heatmap</h6><img src="{{ url_for('static', filename=data.img1.pipeline.heatmap) }}" class="fixed-img"></div></div>
            </div>
            <div class="row mt-3">
                <div class="col-6"><div class="card-panel"><h6>Comparison Graph</h6><canvas id="barChart" height="100"></canvas></div></div>
                <div class="col-6"><div class="card-panel"><h6>Prediction Trend</h6><canvas id="lineChart" height="100"></canvas></div></div>
            </div>
        </div>
    </div>
    <script>
        new Chart(document.getElementById('barChart'), { type: 'bar', data: { labels: ['Img 1', 'Img 2'], datasets: [{ data: [99, 93], backgroundColor: '#3b82f6' }] } });
        new Chart(document.getElementById('lineChart'), { type: 'line', data: { labels: ['S1', 'S2', 'S3', 'S4'], datasets: [{ data: [20, 40, 99, 93], borderColor: '#10b981' }] } });
    </script>
</body>
</html>
